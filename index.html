<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Andon - Performance Logística</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Segoe UI', 'Roboto', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        
        .filtros { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .filtros input { background: #0f172a; color: #fff; border: 1px solid #334155; padding: 5px 10px; border-radius: 6px; }

        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border-bottom: 4px solid #38bdf8; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .card-caminhao { grid-column: span 2; min-height: 220px; padding: 15px; border-bottom: 4px solid #38bdf8; }
        .valor { font-size: 24px; font-weight: bold; display: block; color: #fff; margin-top: 5px; }
        .titulo-card { font-size: 14px; color: #94a3b8; font-weight: 500; margin-bottom: 5px; }

        .container-grafico { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #38bdf8; }

        /* Estilos do Animação do Caminhão */
        .truck-container {
            position: relative;
            width: 100%;
            height: 120px;
            background-color: #0f172a;
            border-radius: 8px;
            overflow: hidden;
            margin: 10px 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .road-line {
            position: absolute;
            bottom: 12px;
            width: 200%;
            height: 3px;
            background: repeating-linear-gradient(90deg, #475569, #475569 15px, transparent 15px, transparent 30px);
        }
        .truck {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: auto;
        }
        .percentage-display { font-size: 26px; font-weight: bold; color: #38bdf8; margin: 2px 0; }
        .progress-bar-container { width: 100%; background-color: #334155; border-radius: 10px; height: 10px; overflow: hidden; margin-bottom: 8px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #f44336, #ff9800); width: 100%; border-radius: 10px; transition: width 0.8s ease-in-out; }
        .truck-inner-text { font-size: 9px; font-family: 'Roboto', sans-serif; font-weight: bold; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
        #details { font-size: 11px; color: #94a3b8; margin: 0; }

        /* Animações CSS do Caminhão e Trabalhadores */
        @keyframes waveMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50px); } }
        .arm-throw { animation: armThrow 2s ease-in-out infinite; transform-origin: 11.5px 31.5px; }
        .arm-arrange { animation: armArrange 2s ease-in-out infinite; transform-origin: -0.5px 48.5px; }
        .arm-stack { animation: armStack 1s linear infinite; transform-origin: 23.5px 48.5px; }
        .falling-box { animation: dropBox 2s linear infinite; transform-origin: center; transform-box: fill-box; }
        
        .b1, .b2, .b3, .b4, .b5, .b6, .b7, .b8, .b9, .b10 { animation-duration: 20s; animation-iteration-count: infinite; }
        .b1  { animation-name: stage1; } .b2  { animation-name: stage2; } .b3  { animation-name: stage3; }
        .b4  { animation-name: stage4; } .b5  { animation-name: stage5; } .b6  { animation-name: stage6; }
        .b7  { animation-name: stage7; } .b8  { animation-name: stage8; } .b9  { animation-name: stage9; }
        .b10 { animation-name: stage10; }

        @keyframes stage1  { 0%, 6% { opacity: 0; } 6.1%, 100% { opacity: 1; } }
        @keyframes stage2  { 0%, 16% { opacity: 0; } 16.1%, 100% { opacity: 1; } }
        @keyframes stage3  { 0%, 26% { opacity: 0; } 26.1%, 100% { opacity: 1; } }
        @keyframes stage4  { 0%, 36% { opacity: 0; } 36.1%, 100% { opacity: 1; } }
        @keyframes stage5  { 0%, 46% { opacity: 0; } 46.1%, 100% { opacity: 1; } }
        @keyframes stage6  { 0%, 56% { opacity: 0; } 56.1%, 100% { opacity: 1; } }
        @keyframes stage7  { 0%, 66% { opacity: 0; } 66.1%, 100% { opacity: 1; } }
        @keyframes stage8  { 0%, 76% { opacity: 0; } 76.1%, 100% { opacity: 1; } }
        @keyframes stage9  { 0%, 86% { opacity: 0; } 86.1%, 100% { opacity: 1; } }
        @keyframes stage10 { 0%, 96% { opacity: 0; } 96.1%, 100% { opacity: 1; } }

        .speech-bubble { opacity: 0; animation: talk 4s infinite; }
        .talking-arm { animation: armTalk 0.6s infinite alternate ease-in-out; }
        .talking-arm-2 { animation: armTalk2 0.6s infinite alternate ease-in-out; animation-delay: 0.3s; }

        @keyframes armThrow { 0%, 100% { transform: rotate(0deg); } 15% { transform: rotate(-50deg); } 30% { transform: rotate(20deg); } 50% { transform: rotate(0deg); } }
        @keyframes armArrange { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(0deg); } 65% { transform: rotate(-30deg); } 80% { transform: rotate(10deg); } }
        @keyframes armStack { 0%, 100% { transform: rotate(10deg); } 50% { transform: rotate(-60deg); } }
        @keyframes dropBox { 0%, 10% { transform: translate(0, 0) rotate(0deg); opacity: 0; } 15% { transform: translate(0, 0) rotate(0deg); opacity: 1; } 30% { transform: translate(-3px, -4px) rotate(-30deg); opacity: 1; } 60% { transform: translate(-6.5px, 22px) rotate(-90deg); opacity: 1; } 70%, 100% { transform: translate(-6.5px, 22px) rotate(-90deg); opacity: 0; } }
        @keyframes talk { 0%, 10%, 100% { opacity: 0; transform: translateY(2px); } 20%, 90% { opacity: 1; transform: translateY(0); } }
        @keyframes armTalk { 0% { transform: rotate(0deg); } 100% { transform: rotate(-25deg); } }
        @keyframes armTalk2 { 0% { transform: rotate(0deg); } 100% { transform: rotate(25deg); } }
    </style>
</head>
<body>

                        <line x1="-0.5" y1="49.5" x2="-0.5" y2="54" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M -0.5 54 L 2 54 L 2 58" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>

    <!-- SEÇÃO REPOSICIONADA: GRÁFICO DE TENDÊNCIA E PREVISÃO (Abaixo dos indicadores) -->
    <div class="container-grafico" style="height: 250px;">
        <div class="titulo-card" style="text-align: center; font-size: 16px; color: #38bdf8; margin-bottom: 10px;">
            Tendência e Previsão de Tempo Médio (Anual)
        </div>
        <div style="height: 190px; position: relative;">
            <canvas id="graficoTendencia"></canvas>
        </div>
    </div>

    <!-- GRÁFICO DE DESEMPENHO DOS SEPARADORES -->
    <div class="container-grafico" style="height: 320px;">
        <canvas id="graficoSeparadores"></canvas>
    </div>

    <!-- TABELA DE TEMPO MÉDIO -->
    <table id="tabelaTempo">
        <thead><tr><th>Separador</th><th>Tempo Médio por Carga</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSL3CqlLCDtDL86CTEbVn0xWs1CmiG8cRY2sje9c9sqy8z4SMj3Fhqh_od5rte0yNP6fxPYB4VoFZwX/pub?gid=0&single=true&output=csv';

        async function atualizarDados() {
            try {
                // Parâmetro anti-cache (_t) garante atualização imediata no GitHub Pages
                const res = await fetch(urlCSV + '&_t=' + Date.now());
                const data = await res.text();
                
                const dataIni = document.getElementById('data-ini').value;
                const dataFim = document.getElementById('data-fim').value;

                Papa.parse(data, {
                    header: true, dynamicTyping: true, skipEmptyLines: true,
                    complete: function(results) {
                        let totalPeso = 0, pesoPendente = 0, contagem = 0, tempoTotalGeral = 0;
                        let pesoPorResp = {}, tempoPorResp = {}, contagemPorResp = {};
                        
                        const mesesHistoricos = Array(12).fill(null).map(() => ({ totalTempo: 0, contagem: 0 }));

                        results.data.forEach(r => {
                            let keys = Object.keys(r);
                            let colResp = keys.find(k => k.toLowerCase().includes('respons') || k.toLowerCase().includes('nome'));
                            let colPeso = keys.find(k => k.toLowerCase().includes('peso'));
                            let colIni = keys.find(k => k.toLowerCase().includes('início') || k.toLowerCase().includes('inicio'));
                            let colFim = keys.find(k => k.toLowerCase().includes('termino') || k.toLowerCase().includes('término'));
                            let colData = keys.find(k => k.toLowerCase().includes('data'));

                            let dataLinha = r[colData]; 
                            if (dataIni && dataFim && (dataLinha < dataIni || dataLinha > dataFim)) return;

                            let resp = r[colResp];
                            let peso = parseFloat(String(r[colPeso] || 0).replace('.', '').replace(',', '.'));
                            
                            let temFim = r[colFim] && String(r[colFim]).trim() !== '';

                            if (peso > 0) {
                                totalPeso += peso;
                                // Se não possui responsável ou falta horário de término, considera como carga pendente
                                if (!resp || !temFim) {
                                    pesoPendente += peso;
                                }
                            }

                            if (resp && temFim && peso > 0) {
                                let inicio = new Date('1970-01-01T' + (r[colIni] || '00:00:00'));
                                let fim = new Date('1970-01-01T' + (r[colFim] || '00:00:00'));
                                let duracao = (fim - inicio) / 60000;

                                if (duracao > 0) {
                                    pesoPorResp[resp] = (pesoPorResp[resp] || 0) + peso;
                                    tempoPorResp[resp] = (tempoPorResp[resp] || 0) + duracao;
                                    contagemPorResp[resp] = (contagemPorResp[resp] || 0) + 1;
                                    contagem++;
                                    tempoTotalGeral += duracao;

                                    if (dataLinha) {
                                        let d = new Date(dataLinha);
                                        if (!isNaN(d.getTime())) {
                                            let m = d.getMonth();
                                            mesesHistoricos[m].totalTempo += duracao;
                                            mesesHistoricos[m].contagem++;
                                        } else {
                                            let partes = String(dataLinha).split(/[-/]/);
                                            if (partes.length >= 2) {
                                                let m = parseInt(partes[1], 10) - 1;
                                                if (m >= 0 && m <= 11) {
                                                    mesesHistoricos[m].totalTempo += duracao;
                                                    mesesHistoricos[m].contagem++;
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        });

                        document.getElementById('txt-peso').innerText = totalPeso.toLocaleString('pt-BR', {minimumFractionDigits: 2}) + " Kg";
                        document.getElementById('txt-cargas').innerText = contagem;
                        let mediaGeral = contagem > 0 ? (tempoTotalGeral / contagem) : 0;
                        document.getElementById('txt-tempo').innerText = mediaGeral.toFixed(1) + " min";
                        
                        // Cálculo da Porcentagem Pendente para o Caminhão
                        let pctPendente = totalPeso > 0 ? Math.round((pesoPendente / totalPeso) * 100) : 0;
                        pctPendente = Math.max(0, Math.min(100, pctPendente));

                        renderizarCaminhao(pctPendente, pesoPendente, totalPeso);
                        atualizarTabela(tempoPorResp, contagemPorResp);
                        desenharGrafico(pesoPorResp);
                        gerarGraficoTendencia(mesesHistoricos);
                    }
                });
            } catch (err) {
                console.error("Erro ao carregar os dados:", err);
            }
        }

        // Função que renderiza e anima o Caminhão SVG no card superior
        function renderizarCaminhao(porcentagem, pesoPendente, pesoTotal) {
            document.getElementById('pct-text').innerText = porcentagem + "%";
            var truckTextShadow = document.getElementById('truck-text-shadow');
            truckTextShadow.textContent = porcentagem + "%";
            
            document.getElementById('details').innerText = "Falta separar: " + pesoPendente.toLocaleString('pt-BR', {minimumFractionDigits: 2}) + " Kg de " + pesoTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2}) + " Kg.";
            
            var barra = document.getElementById('bar');
            barra.style.width = porcentagem + "%";
            
            var liquidContainer = document.getElementById('liquid-container');
            var liquidWave = document.getElementById('liquid-wave');
            
            var alturaY = 50 - (porcentagem * 0.40);
            liquidContainer.setAttribute('transform', 'translate(0, ' + alturaY + ')');
            
            var groupWorking = document.getElementById('workers-working');
            var groupResting = document.getElementById('workers-resting');

            if (porcentagem === 0) {
                liquidWave.setAttribute('fill', '#4caf50'); 
                truckTextShadow.setAttribute('fill', '#ffffff');
                liquidWave.style.animation = "none"; 
                groupWorking.style.display = "none";
                groupResting.style.display = "block";
            } else {
                if (porcentagem > 60) {
                    liquidWave.setAttribute('fill', '#f44336');
                    barra.style.background = "linear-gradient(90deg, #f44336, #ff9800)";
                    truckTextShadow.setAttribute('fill', '#ffffff'); 
                } else if (porcentagem > 20) {
                    liquidWave.setAttribute('fill', '#ff9800'); 
                    barra.style.background = "linear-gradient(90deg, #ff9800, #ffeb3b)";
                    truckTextShadow.setAttribute('fill', '#202124'); 
                } else {
                    liquidWave.setAttribute('fill', '#ffeb3b'); 
                    barra.style.background = "linear-gradient(90deg, #ffeb3b, #4caf50)";
                    truckTextShadow.setAttribute('fill', '#202124'); 
                }

                liquidWave.style.animation = "waveMove 1.2s linear infinite";
                groupWorking.style.display = "block";
                groupResting.style.display = "none";
            }
        }

        // Gráfico de Tendência (Com Regressão Linear Simples)
        function gerarGraficoTendencia(mesesHistoricos) {
            const META_LIMITE = 30;
            const labelsMeses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            
            let mediasReais = Array(12).fill(null);
            let xPoints = [], yPoints = [];

            for (let i = 0; i < 12; i++) {
                if (mesesHistoricos[i].contagem > 0) {
                    let mediaMes = mesesHistoricos[i].totalTempo / mesesHistoricos[i].contagem;
                    mediasReais[i] = parseFloat(mediaMes.toFixed(1));
                    xPoints.push(i);
                    yPoints.push(mediaMes);
                }
            }

            let slope = 0, intercept = META_LIMITE; 
            const n = xPoints.length;
            if (n > 1) {
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                for (let i = 0; i < n; i++) {
                    sumX += xPoints[i];
                    sumY += yPoints[i];
                    sumXY += xPoints[i] * yPoints[i];
                    sumX2 += xPoints[i] * xPoints[i];
                }
                slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                intercept = (sumY - slope * sumX) / n;
            } else if (n === 1) {
                intercept = yPoints[0];
            }

            let valoresTendencia = [];
            for (let i = 0; i < 12; i++) {
                valoresTendencia.push(parseFloat((slope * i + intercept).toFixed(1)));
            }

            let valoresMeta = Array(12).fill(META_LIMITE);

            const ctx = document.getElementById('graficoTendencia').getContext('2d');
            if (window.meuGraficoTendencia) window.meuGraficoTendencia.destroy();

            window.meuGraficoTendencia = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labelsMeses,
                    datasets: [
                        { label: 'Meta', data: valoresMeta, borderColor: '#ef4444', borderWidth: 1.5, pointRadius: 0, fill: false },
                        { label: 'Média Real', data: mediasReais, borderColor: '#38bdf8', backgroundColor: '#38bdf8', borderWidth: 3, pointRadius: 5, pointHoverRadius: 7, fill: false, tension: 0.1 },
                        { label: 'Tendência', data: valoresTendencia, borderColor: '#f59e0b', borderWidth: 2, borderDash: [5, 5], pointRadius: 0, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true, labels: { color: '#94a3b8' } } },
                    scales: {
                        x: { grid: { color: '#334155', display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 10 } }, min: 0 }
                    }
                }
            });
        }

        function atualizarTabela(tempoTotal, contagem) {
            let tbody = document.querySelector("#tabelaTempo tbody");
            tbody.innerHTML = "";
            for (let nome in tempoTotal) {
                let media = (tempoTotal[nome] / contagem[nome]).toFixed(1);
                tbody.innerHTML += `<tr><td>${nome}</td><td>${media} min</td></tr>`;
            }
        }

        function desenharGrafico(dados) {
            const ctx = document.getElementById('graficoSeparadores').getContext('2d');
            if(window.meuGrafico) window.meuGrafico.destroy();
            window.meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(dados), datasets: [{ label: 'Kg por Separador', data: Object.values(dados), backgroundColor: '#38bdf8' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } } }
            });
        }

        // Atualização automática a cada 60 segundos
        setInterval(atualizarDados, 60000);
        atualizarDados();
    </script>
