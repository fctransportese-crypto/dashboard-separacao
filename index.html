<!DOCTYPE html>
<html>
<body>
    <h1>Diagnóstico do Dashboard</h1>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSL3CqlLCDtDL86CTEBVn0xWs1CmiG8cRY2sje9c9sqy8z4SMj3Fhqh_od5rte0yNP6fxPYB4VoFZwX/pub?gid=0&single=true&output=csv';

        fetch(urlCSV)
            .then(res => res.text())
            .then(data => {
                Papa.parse(data, {
                    header: true,
                    complete: function(results) {
                        // Isso vai abrir um alerta no seu navegador com os nomes das colunas
                        alert("Colunas encontradas: " + Object.keys(results.data[0]).join(", "));
                        console.log("Dados completos:", results.data);
                    }
                });
            });
    </script>
</body>
</html>
