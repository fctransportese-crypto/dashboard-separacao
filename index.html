<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão à Vista: Performance de Separação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border-bottom: 4px solid #38bdf8; }
        .valor { font-size: 26px; font-weight: bold; color: #fff; margin-top: 5px; display: block; }
        .titulo-card { font-size: 14px; color: #94a3b8; font-weight: bold; }
        .card-grafico { grid-column: span 2; min-height: 250px; }
        .pct-display { font-size: 40px; font-weight: 900; margin: 10px 0; color: #38bdf8; }
        .progress-bar-bg { width: 80%; margin: 0 auto; height: 15px; background: #334155; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #10b981; width: 0%; transition: width 0.5s; }
    </style>
</head>
<body>

    <h1>Gestão à Vista: Performance de Separação</h1>

    <div class="grid-stats">
        <div class="card"><div class="titulo-card">Peso Total</div><span id="txt-peso" class="valor">0 Kg</span></div>
        <div class="card"><div class="titulo-card">Total Cargas</div><span id="txt-cargas" class="valor">0</span></div>
        <div class="card"><div class="titulo-card">Tempo Médio</div><span id="txt-tempo" class="valor">0 min</span></div>
        
        <div class="card card-grafico">
            <div class="titulo-card">Progresso do Lote Atual</div>
            <div class="pct-display" id="pct-texto">0%</div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="pct-barra"></div></div>
            <div style="height: 150px; margin-top: 20px;">
                <canvas id="graficoBurndown"></canvas>
            </div>
        </div>
    </div>

    <script>
        // === COLE O SEU LINK DE PUBLICAR NA WEB AQUI ===
        const URL_DO_SEU_CSV = 'https://script.google.com/macros/s/AKfycbybu_SnLR1fE17ixG6gMjf1ykZJ1NTdWVh5_W0wSo4GIEa_j7loC8jXcjhNA631-U6E/exec'; 
        // ===============================================

        async function atualizarProgresso() {
            // O "&cb=" + Date.now() força o navegador a buscar o arquivo novo, ignorando o cache
            const cacheBuster = `&cb=${Date.now()}`;
            
            try {
                const response = await fetch(URL_DO_SEU_CSV + cacheBuster);
                const csvText = await response.text();

                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        processarDados(results.data);
                    }
                });
            } catch (err) {
                console.error("Erro ao carregar dados:", err);
            }
        }

        function processarDados(data) {
            let totalPeso = 0;
            let pesoPendente = 0;
            let contagem = 0;

            // Ajuste os nomes dos campos abaixo para os cabeçalhos exatos da sua planilha
            data.forEach(row => {
                let peso = parseFloat(String(row['Peso']).replace(',', '.')) || 0;
                let status = String(row['Termino']).trim(); 
                
                totalPeso += peso;
                if (status === "") {
                    pesoPendente += peso;
                } else {
                    contagem++;
                }
            });

            let pctConcluido = totalPeso > 0 ? Math.round(((totalPeso - pesoPendente) / totalPeso) * 100) : 0;
            
            // Atualizar Interface
            document.getElementById('txt-peso').innerText = totalPeso.toLocaleString('pt-BR') + " Kg";
            document.getElementById('txt-cargas').innerText = contagem;
            document.getElementById('pct-texto').innerText = pctConcluido + "% Concluído";
            document.getElementById('pct-barra').style.width = pctConcluido + "%";

            desenharBurndown(totalPeso, pesoPendente);
        }

        function desenharBurndown(total, pendente) {
            const ctx = document.getElementById('graficoBurndown').getContext('2d');
            if (window.chart) window.chart.destroy();

            window.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Início', 'Atual'],
                    datasets: [{
                        label: 'Peso Pendente (Kg)',
                        data: [total, pendente],
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Executa ao carregar e a cada 10 segundos
        window.onload = atualizarProgresso;
        setInterval(atualizarProgresso, 10000);
    </script>
</body>
</html>
