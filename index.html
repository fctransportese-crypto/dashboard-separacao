<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão à Vista: Performance de Separação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 20px; font-weight: 700; }
        .filtros { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 14px; color: #94a3b8; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border-bottom: 4px solid #38bdf8; text-align: center; }
        .card-burndown { grid-column: span 2; min-height: 250px; padding: 20px; border-bottom: 4px solid #38bdf8; }
        .valor { font-size: 26px; font-weight: bold; color: #fff; margin-top: 5px; }
        .titulo-card { font-size: 15px; color: #38bdf8; font-weight: bold; margin-bottom: 5px; }
        .pct-gigante { font-size: 42px; font-weight: 900; color: #f8fafc; margin: 10px 0; }
        .progress-bar-wrapper { width: 80%; margin: 0 auto 10px auto; background-color: #334155; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981); width: 0%; border-radius: 10px; transition: width 0.5s ease-in-out; }
        #details { font-size: 13px; color: #94a3b8; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Gestão à Vista: Performance de Separação</h1>

    <div class="grid-stats">
        <div class="card">
            <div class="titulo-card">Peso Total</div>
            <span id="txt-peso" class="valor">0 Kg</span>
        </div>
        <div class="card">
            <div class="titulo-card">Total Cargas</div>
            <span id="txt-cargas" class="valor">0</span>
        </div>
        <div class="card">
            <div class="titulo-card">Tempo Médio</div>
            <span id="txt-tempo" class="valor">0 min</span>
        </div>

        <div class="card card-burndown">
            <div class="titulo-card">Progresso do Lote Atual (L. 600+)</div>
            <div class="pct-gigante" id="pct-texto">0%</div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="pct-barra"></div>
            </div>
            <p id="details">Carregando dados...</p>
            <div style="height: 150px; position: relative; width: 100%;">
                <canvas id="graficoBurndown"></canvas>
            </div>
        </div>
    </div>

    <script>
        // URL Original do CSV
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSL3CqlLCDtDL86CTEbVn0xWs1CmiG8cRY2sje9c9sqy8z4SMj3Fhqh_od5rte0yNP6fxPYB4VoFZwX/pub?gid=0&single=true&output=csv';

        async function atualizarDados() {
            // Adiciona timestamp para impedir que o navegador use o arquivo cacheado
            const cacheBuster = `&cb=${new Date().getTime()}`;
            
            try {
                const response = await fetch(urlCSV + cacheBuster);
                const csvData = await response.text();

                Papa.parse(csvData, {
                    header: true, dynamicTyping: true, skipEmptyLines: true,
                    complete: function(results) {
                        let totalPesoLote = 0;
                        let pesoPendente = 0;
                        let contagem = 0;
                        let rows = [];

                        results.data.forEach((r, idx) => {
                            // Filtro de Linha 600+
                            if (idx < 599) return; 

                            let peso = parseFloat(String(r['Peso']).replace(',', '.')) || 0;
                            let status = String(r['Termino'] || '');
                            
                            totalPesoLote += peso;
                            if (status.trim() === "") {
                                pesoPendente += peso;
                            }

                            rows.push({ peso: peso, temFim: status.trim() !== "" });
                            if (status.trim() !== "") contagem++;
                        });

                        // Cálculo da porcentagem (Quanto foi concluído)
                        let pesoConcluido = totalPesoLote - pesoPendente;
                        let pct = totalPesoLote > 0 ? Math.round((pesoPendente / totalPesoLote) * 100) : 0;
                        
                        // Atualiza Visuais
                        document.getElementById('txt-peso').innerText = totalPesoLote.toLocaleString('pt-BR') + " Kg";
                        document.getElementById('txt-cargas').innerText = contagem;
                        document.getElementById('pct-texto').innerText = pct + "% Pendente";
                        document.getElementById('pct-barra').style.width = pct + "%";
                        document.getElementById('details').innerText = `Falta separar: ${Math.round(pesoPendente).toLocaleString('pt-BR')} kg de ${Math.round(totalPesoLote).toLocaleString('pt-BR')} kg.`;

                        desenharBurndown(totalPesoLote, pesoPendente);
                    }
                });
            } catch (e) {
                console.error("Erro ao carregar:", e);
            }
        }

        function desenharBurndown(total, pendente) {
            const ctx = document.getElementById('graficoBurndown').getContext('2d');
            if (window.chart) window.chart.destroy();

            window.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Início', 'Atual'],
                    datasets: [{
                        label: 'Peso Pendente',
                        data: [total, pendente],
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.2)',
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        // Atualiza a cada 10 segundos
        atualizarDados();
        setInterval(atualizarDados, 10000);
    </script>
</body>
</html>
