<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Andon - Performance Logística</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .filtros { display: flex; gap: 15px; margin-bottom: 20px; background: #1e293b; padding: 15px; border-radius: 10px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border-bottom: 4px solid #38bdf8; text-align: center; }
        .valor { font-size: 22px; font-weight: bold; display: block; color: #38bdf8; }
        .container-grafico { background: #1e293b; padding: 20px; border-radius: 12px; height: 400px; }
    </style>
</head>
<body>

    <h1>Gestão à Vista: Performance</h1>

    <div class="filtros">
        <select id="filtroResp" onchange="atualizar()">
            <option value="Todos">Todos Separadores</option>
        </select>
        <input type="date" id="filtroData" onchange="atualizar()">
    </div>

    <div class="grid-stats">
        <div class="card">Peso Total<span id="txt-peso" class="valor">0 Kg</span></div>
        <div class="card">Total Cargas<span id="txt-cargas" class="valor">0</span></div>
        <div class="card">Tempo Médio/Carga<span id="txt-tempo" class="valor">0 min</span></div>
    </div>

    <div class="container-grafico">
        <canvas id="graficoSeparadores"></canvas>
    </div>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSL3CqlLCDtDL86CTEbVn0xWs1Cmig8cRY2sje9c9sqy8z4SMj3Fhqh_od5rte0yNP6fxPYB4VoFZwX/pub?gid=0&single=true&output=csv';
        let dadosGlobais = [];

        async function carregarDados() {
            const res = await fetch(urlCSV);
            const data = await res.text();
            Papa.parse(data, { header: true, dynamicTyping: true, complete: (res) => {
                dadosGlobais = res.data;
                popularFiltros();
                atualizar();
            }});
        }

        function popularFiltros() {
            let reps = [...new Set(dadosGlobais.map(r => r.Responsável).filter(r => r))];
            let select = document.getElementById('filtroResp');
            reps.forEach(r => select.innerHTML += `<option value="${r}">${r}</option>`);
        }

        function atualizar() {
            let filtroResp = document.getElementById('filtroResp').value;
            let filtroData = document.getElementById('filtroData').value;
            let filtrados = dadosGlobais.filter(r => {
                let matchResp = (filtroResp === "Todos" || r.Responsável === filtroResp);
                let matchData = (!filtroData || r['Data montagem'] === filtroData);
                return matchResp && matchData;
            });

            let pesoTotal = 0, contagem = 0, tempoTotal = 0;

            filtrados.forEach(r => {
                let peso = parseFloat(String(r.Peso).replace(',', '.'));
                if (r.Responsável && peso > 0) {
                    pesoTotal += peso;
                    contagem++;
                    // Cálculo de tempo: diferença entre 'Horário Termino' e 'Horário de início'
                    let inicio = new Date('1970-01-01T' + r['Horário de início']);
                    let fim = new Date('1970-01-01T' + r['Horário Termino']);
                    tempoTotal += (fim - inicio) / 60000;
                }
            });

            document.getElementById('txt-peso').innerText = pesoTotal.toFixed(2) + " Kg";
            document.getElementById('txt-cargas').innerText = contagem;
            document.getElementById('txt-tempo').innerText = (contagem ? (tempoTotal/contagem).toFixed(1) : 0) + " min";
            
            renderizarGrafico(filtrados);
        }

        function renderizarGrafico(dados) {
            let agrupado = {};
            dados.forEach(r => { if(r.Responsável) agrupado[r.Responsável] = (agrupado[r.Responsável]||0) + parseFloat(String(r.Peso).replace(',', '.')); });
            
            const ctx = document.getElementById('graficoSeparadores').getContext('2d');
            if(window.meuGrafico) window.meuGrafico.destroy();
            window.meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(agrupado), datasets: [{ label: 'Kg por Separador', data: Object.values(agrupado), backgroundColor: '#38bdf8' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        carregarDados();
    </script>
</body>
</html>
