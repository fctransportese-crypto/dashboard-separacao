<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Andon - Performance Logística</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        .filtros { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border-bottom: 4px solid #38bdf8; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .card-grafico { grid-column: span 2; min-height: 180px; }
        .valor { font-size: 24px; font-weight: bold; display: block; color: #fff; margin-top: 5px; }
        .container-grafico { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; height: 350px; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #38bdf8; }
        .titulo-card-meta { font-size: 14px; color: #94a3b8; font-weight: 500; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>Gestão à Vista: Performance de Separação</h1>

    <div class="filtros">
        Período: <input type="date" id="data-ini" onchange="atualizarDados()"> 
        até <input type="date" id="data-fim" onchange="atualizarDados()">
    </div>

    <div class="grid-stats">
        <div class="card">Peso Total<span id="txt-peso" class="valor">0 Kg</span></div>
        <div class="card">Total Cargas<span id="txt-cargas" class="valor">0</span></div>
        <div class="card">Tempo Médio Equipe<span id="txt-tempo" class="valor">0 min</span></div>
        <!-- Card substituído por um container amplo para o gráfico de tendência -->
        <div class="card card-grafico" id="card-meta">
            <div class="titulo-card-meta">Tendência e Previsão de Tempo Médio (Anual)</div>
            <div style="flex-grow: 1; height: 130px; position: relative;">
                <canvas id="graficoTendencia"></canvas>
            </div>
        </div>
    </div>

    <div class="container-grafico">
        <canvas id="graficoSeparadores"></canvas>
    </div>

    <table id="tabelaTempo">
        <thead><tr><th>Separador</th><th>Tempo Médio por Carga</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSL3CqlLCDtDL86CTEbVn0xWs1CmiG8cRY2sje9c9sqy8z4SMj3Fhqh_od5rte0yNP6fxPYB4VoFZwX/pub?gid=0&single=true&output=csv';

        async function atualizarDados() {
            const res = await fetch(urlCSV);
            const data = await res.text();
            
            const dataIni = document.getElementById('data-ini').value;
            const dataFim = document.getElementById('data-fim').value;

            Papa.parse(data, {
                header: true, dynamicTyping: true, skipEmptyLines: true,
                complete: function(results) {
                    let totalPeso = 0, contagem = 0, tempoTotalGeral = 0;
                    let pesoPorResp = {}, tempoPorResp = {}, contagemPorResp = {};
                    
                    // Estrutura para agrupar dados históricos por mês (0 = Jan, 11 = Dez)
                    const mesesHistoricos = Array(12).fill(null).map(() => ({ totalTempo: 0, contagem: 0 }));

                    results.data.forEach(r => {
                        let keys = Object.keys(r);
                        let colResp = keys.find(k => k.toLowerCase().includes('respons') || k.toLowerCase().includes('nome'));
                        let colPeso = keys.find(k => k.toLowerCase().includes('peso'));
                        let colIni = keys.find(k => k.toLowerCase().includes('início') || k.toLowerCase().includes('inicio'));
                        let colFim = keys.find(k => k.toLowerCase().includes('termino') || k.toLowerCase().includes('término'));
                        let colData = keys.find(k => k.toLowerCase().includes('data'));

                        let dataLinha = r[colData]; 
                        if (dataIni && dataFim && (dataLinha < dataIni || dataLinha > dataFim)) return;

                        let resp = r[colResp];
                        let peso = parseFloat(String(r[colPeso] || 0).replace('.', '').replace(',', '.'));
                        let inicio = new Date('1970-01-01T' + (r[colIni] || '00:00:00'));
                        let fim = new Date('1970-01-01T' + (r[colFim] || '00:00:00'));
                        let duracao = (fim - inicio) / 60000;

                        if (resp && peso > 0 && duracao > 0) {
                            pesoPorResp[resp] = (pesoPorResp[resp] || 0) + peso;
                            tempoPorResp[resp] = (tempoPorResp[resp] || 0) + duracao;
                            contagemPorResp[resp] = (contagemPorResp[resp] || 0) + 1;
                            totalPeso += peso;
                            contagem++;
                            tempoTotalGeral += duracao;

                            // Tenta extrair o mês da linha para montar a série temporal anual
                            if (dataLinha) {
                                let d = new Date(dataLinha);
                                if (!isNaN(d.getTime())) {
                                    let m = d.getMonth();
                                    mesesHistoricos[m].totalTempo += duracao;
                                    mesesHistoricos[m].contagem++;
                                } else {
                                    let partes = String(dataLinha).split(/[-/]/);
                                    if (partes.length >= 2) {
                                        let m = parseInt(partes[1], 10) - 1;
                                        if (m >= 0 && m <= 11) {
                                            mesesHistoricos[m].totalTempo += duracao;
                                            mesesHistoricos[m].contagem++;
                                        }
                                    }
                                }
                            }
                        }
                    });

                    document.getElementById('txt-peso').innerText = totalPeso.toLocaleString('pt-BR', {minimumFractionDigits: 2}) + " Kg";
                    document.getElementById('txt-cargas').innerText = contagem;
                    let mediaGeral = contagem > 0 ? (tempoTotalGeral / contagem) : 0;
                    document.getElementById('txt-tempo').innerText = mediaGeral.toFixed(1) + " min";
                    
                    atualizarTabela(tempoPorResp, contagemPorResp);
                    desenharGrafico(pesoPorResp);
                    gerarGraficoTendencia(mesesHistoricos);
                }
            });
        }

        function gerarGraficoTendencia(mesesHistoricos) {
            const META_LIMITE = 30;
            const labelsMeses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            
            let mediasReais = Array(12).fill(null);
            let xPoints = [], yPoints = [];

            // Calcula as médias reais encontradas nos meses convertidos
            for (let i = 0; i < 12; i++) {
                if (mesesHistoricos[i].contagem > 0) {
                    let mediaMes = mesesHistoricos[i].totalTempo / mesesHistoricos[i].contagem;
                    mediasReais[i] = parseFloat(mediaMes.toFixed(1));
                    xPoints.push(i);
                    yPoints.push(mediaMes);
                }
            }

            // Cálculo estatístico de Regressão Linear Simples: y = mx + b
            let slope = 0, intercept = META_LIMITE; 
            const n = xPoints.length;
            if (n > 1) {
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                for (let i = 0; i < n; i++) {
                    sumX += xPoints[i];
                    sumY += yPoints[i];
                    sumXY += xPoints[i] * yPoints[i];
                    sumX2 += xPoints[i] * xPoints[i];
                }
                slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                intercept = (sumY - slope * sumX) / n;
            } else if (n === 1) {
                intercept = yPoints[0];
            }

            // Gera a projeção contínua da reta de tendência para todos os meses do ano
            let valoresTendencia = [];
            for (let i = 0; i < 12; i++) {
                valoresTendencia.push(parseFloat((slope * i + intercept).toFixed(1)));
            }

            // Definição estática da linha horizontal de meta
            let valoresMeta = Array(12).fill(META_LIMITE);

            // Renderização ou reajuste do Chart.js interno do Card
            const ctx = document.getElementById('graficoTendencia').getContext('2d');
            if (window.meuGraficoTendencia) window.meuGraficoTendencia.destroy();

            window.meuGraficoTendencia = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labelsMeses,
                    datasets: [
                        {
                            label: 'Meta',
                            data: valoresMeta,
                            borderColor: '#ef4444',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            fill: false
                        },
                        {
                            label: 'Média Real',
                            data: mediasReais,
                            borderColor: '#38bdf8',
                            backgroundColor: '#38bdf8',
                            borderWidth: 3,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            fill: false,
                            tension: 0.1
                        },
                        {
                            label: 'Tendência',
                            data: valoresTendencia,
                            borderColor: '#f59e0b',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            grid: { color: '#334155', display: false },
                            ticks: { color: '#94a3b8', font: { size: 9 } }
                        },
                        y: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8', font: { size: 9 } },
                            min: 0
                        }
                    }
                }
            });

            // Altera dinamicamente as bordas decorativas do Card de acordo com o último dado real obtido
            const card = document.getElementById('card-meta');
            const ultimaMediaReal = yPoints[yPoints.length - 1] || 0;
            if (ultimaMediaReal > META_LIMITE) {
                card.style.borderBottom = "4px solid #ef4444";
            } else {
                card.style.borderBottom = "4px solid #10b981";
            }
        }

        function atualizarTabela(tempoTotal, contagem) {
            let tbody = document.querySelector("#tabelaTempo tbody");
            tbody.innerHTML = "";
            for (let nome in tempoTotal) {
                let media = (tempoTotal[nome] / contagem[nome]).toFixed(1);
                tbody.innerHTML += `<tr><td>${nome}</td><td>${media} min</td></tr>`;
            }
        }

        function desenharGrafico(dados) {
            const ctx = document.getElementById('graficoSeparadores').getContext('2d');
            if(window.meuGrafico) window.meuGrafico.destroy();
            window.meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(dados), datasets: [{ label: 'Kg por Separador', data: Object.values(dados), backgroundColor: '#38bdf8' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        setInterval(atualizarDados, 60000);
        atualizarDados();
    </script>
</body>
</html>
