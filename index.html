<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Andon - Performance Logística</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 30px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border-bottom: 4px solid #38bdf8; text-align: center; }
        .valor { font-size: 24px; font-weight: bold; display: block; color: #fff; }
        .container-grafico { background: #1e293b; padding: 20px; border-radius: 12px; }
        
        /* Estilos do Botão e Pop-up */
        .btn-filtro { background: #38bdf8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: block; margin: 0 auto 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #1e293b; margin: 10% auto; padding: 20px; width: 300px; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>Gestão à Vista: Performance de Separação</h1>

    <button class="btn-filtro" onclick="document.getElementById('modal').style.display='block'">Filtrar por Operador/Data</button>

    <div class="grid-stats">
        <div class="card">Peso Total Separado<span id="txt-peso" class="valor">0 Kg</span></div>
        <div class="card">Total de Cargas<span id="txt-cargas" class="valor">0</span></div>
    </div>

    <div class="container-grafico">
        <canvas id="graficoSeparadores"></canvas>
    </div>

    <!-- Modal de Filtro -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Filtrar Dados</h3>
            <select id="sel-resp" style="width:100%"><option>Todos</option></select><br><br>
            De: <input type="date" id="data-ini"><br>
            Até: <input type="date" id="data-fim"><br><br>
            <button onclick="aplicarFiltro()">Filtrar</button>
            <button onclick="document.getElementById('modal').style.display='none'">Fechar</button>
        </div>
    </div>

    <script>
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSL3CqlLCDtDL86CTEbVn0xWs1Cmig8cRY2sje9c9sqy8z4SMj3Fhqh_od5rte0yNP6fxPYB4VoFZwX/pub?gid=0&single=true&output=csv';
        let dadosGlobais = [];

        async function carregarDados() {
            const res = await fetch(urlCSV);
            const data = await res.text();
            Papa.parse(data, { header: true, dynamicTyping: true, complete: (res) => {
                dadosGlobais = res.data;
                let reps = [...new Set(dadosGlobais.map(r => r.Responsável).filter(r => r))];
                reps.forEach(r => document.getElementById('sel-resp').innerHTML += `<option value="${r}">${r}</option>`);
                renderizar(dadosGlobais);
            }});
        }

        function aplicarFiltro() {
            let r = document.getElementById('sel-resp').value;
            let d1 = document.getElementById('data-ini').value;
            let d2 = document.getElementById('data-fim').value;
            
            let filtrados = dadosGlobais.filter(d => {
                let matchR = (r === "Todos" || d.Responsável === r);
                let matchD = (!d1 || !d2 || (d['Data montagem'] >= d1 && d['Data montagem'] <= d2));
                return matchR && matchD;
            });
            
            renderizar(filtrados);
            document.getElementById('modal').style.display = 'none';
        }

        function renderizar(data) {
            let totalPeso = 0, contagem = 0, acumulado = {};
            data.forEach(r => {
                let peso = typeof r.Peso === 'string' ? parseFloat(r.Peso.replace('.', '').replace(',', '.')) : r.Peso;
                if (r.Responsável && peso > 0) {
                    totalPeso += peso; contagem++;
                    acumulado[r.Responsável] = (acumulado[r.Responsável] || 0) + peso;
                }
            });
            document.getElementById('txt-peso').innerText = totalPeso.toLocaleString('pt-BR') + " Kg";
            document.getElementById('txt-cargas').innerText = contagem;
            
            const ctx = document.getElementById('graficoSeparadores').getContext('2d');
            if(window.chart) window.chart.destroy();
            window.chart = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(acumulado), datasets: [{ label: 'Kg por Separador', data: Object.values(acumulado), backgroundColor: '#38bdf8' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        carregarDados();
    </script>
</body>
</html>
