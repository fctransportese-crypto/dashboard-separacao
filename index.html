<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão à Vista: Performance de Separação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .filtros {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }
        .filtros input {
            background: #0f172a;
            color: #fff;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 6px;
            margin: 0 5px;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border-bottom: 4px solid #38bdf8;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card-burndown {
            grid-column: span 2;
            min-height: 250px;
            padding: 20px;
            border-bottom: 4px solid #38bdf8;
            position: relative;
        }
        .valor {
            font-size: 26px;
            font-weight: bold;
            display: block;
            color: #fff;
            margin-top: 5px;
        }
        .titulo-card {
            font-size: 15px;
            color: #38bdf8;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .container-grafico {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            color: #38bdf8;
        }

        /* Estilo da Porcentagem Gigante no Burndown */
        .pct-gigante {
            font-size: 42px;
            font-weight: 900;
            color: #f8fafc;
            margin: 10px 0;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
        }

        /* Barra de Progresso Visual */
        .progress-bar-wrapper {
            width: 80%;
            margin: 0 auto 10px auto;
            background-color: #334155;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
            width: 100%;
            border-radius: 10px;
            transition: width 0.8s ease-in-out;
        }

        #details {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Gestão à Vista: Performance de Separação</h1>

    <div class="filtros">
        Período: <input type="date" id="data-ini" onchange="atualizarDados()"> 
        até <input type="date" id="data-fim" onchange="atualizarDados()">
    </div>

    <!-- CARDS SUPERIORES -->
    <div class="grid-stats">
        <div class="card">
            <div class="titulo-card" style="color: #94a3b8; font-weight: 500;">Peso Total (Geral)</div>
            <span id="txt-peso" class="valor">0 Kg</span>
        </div>
        <div class="card">
            <div class="titulo-card" style="color: #94a3b8; font-weight: 500;">Total Cargas (Geral)</div>
            <span id="txt-cargas" class="valor">0</span>
        </div>
        <div class="card">
            <div class="titulo-card" style="color: #94a3b8; font-weight: 500;">Tempo Médio Equipe</div>
            <span id="txt-tempo" class="valor">0 min</span>
        </div>

        <!-- CARD DO GRÁFICO DE BURNDOWN (INTUITIVO) -->
        <div class="card card-burndown">
            <div class="titulo-card">Progresso da Separação do Lote (L. 600+)</div>
            
            <!-- Indicadores Visuais Espelhados da Animação Antiga -->
            <div class="pct-gigante" id="pct-texto">100%</div>
            
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="pct-barra"></div>
            </div>
            
            <p id="details">A carregar informações...</p>

            <!-- Área do Gráfico de Linha -->
            <div style="height: 180px; position: relative; width: 100%; margin-top: 10px;">
                <canvas id="graficoBurndown"></canvas>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: GRÁFICO DE TENDÊNCIA E PREVISÃO -->
    <div class="container-grafico" style="height: 250px;">
        <div class="titulo-card" style="text-align: center; margin-bottom: 10px;">
            Tendência e Previsão de Tempo Médio (Anual)
        </div>
        <div style="height: 190px; position: relative;">
            <canvas id="graficoTendencia"></canvas>
        </div>
    </div>

    <!-- GRÁFICO DE DESEMPENHO DOS SEPARADORES -->
    <div class="container-grafico" style="height: 320px;">
        <canvas id="graficoSeparadores"></canvas>
    </div>

    <!-- TABELA DE TEMPO MÉDIO -->
    <table id="tabelaTempo">
        <thead><tr><th>Separador</th><th>Tempo Médio por Carga</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbybu_SnLR1fE17ixG6gMjf1ykZJ1NTdWVh5_W0wSo4GIEa_j7loC8jXcjhNA631-U6E/exec?api=true';
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSL3CqlLCDtDL86CTEbVn0xWs1CmiG8cRY2sje9c9sqy8z4SMj3Fhqh_od5rte0yNP6fxPYB4VoFZwX/pub?gid=0&single=true&output=csv';

        function parseNumero(valor) {
            if (typeof valor === 'number') return valor;
            if (!valor) return 0;
            let str = String(valor).trim();
            if (str.includes(',')) {
                str = str.replace(/\./g, '').replace(',', '.');
            } else if ((str.match(/\./g) || []).length > 1) {
                str = str.replace(/\./g, '');
            }
            let n = parseFloat(str);
            return isNaN(n) ? 0 : n;
        }

        function normalizarData(dataStr) {
            if (!dataStr) return '';
            let str = String(dataStr).trim();
            if (str.includes('T')) str = str.split('T')[0];
            let partes = str.split(/[-/]/);
            if (partes.length === 3) {
                if (partes[0].length === 4) return `${partes[0]}-${partes[1].padStart(2,'0')}-${partes[2].padStart(2,'0')}`;
                if (partes[2].length === 4) return `${partes[2]}-${partes[1].padStart(2,'0')}-${partes[0].padStart(2,'0')}`;
            }
            return str;
        }

        function extrairHoraNumerica(horarioStr) {
            if (!horarioStr) return null;
            let str = String(horarioStr).trim().toLowerCase();
            let match = str.match(/(\d{1,2}):(\d{2})/);
            if (match) {
                let h = parseInt(match[1], 10);
                if (str.includes('pm') && h < 12) h += 12;
                if (str.includes('am') && h === 12) h = 0;
                return h;
            }
            return null;
        }

        async function atualizarDados() {
            let dadosApiAppsScript = null;

            // 1. Tentativa Rápida na API (se falhar pelo CORS, não trava o site)
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const response = await fetch(webAppUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (response.ok) {
                    dadosApiAppsScript = await response.json();
                }
            } catch (e) {
                console.warn("API indisponível (CORS/Timeout). Acionando redundância nativa via CSV.");
            }

            // 2. Leitura Completa via CSV (Garante que os dados sempre apareçam)
            try {
                const res = await fetch(urlCSV + '&_t=' + Date.now());
                const data = await res.text();

                Papa.parse(data, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        let totalPesoGeral = 0;
                        let contagem = 0, tempoTotalGeral = 0;
                        let pesoPorResp = {}, tempoPorResp = {}, contagemPorResp = {};
                        const mesesHistoricos = Array(12).fill(null).map(() => ({ totalTempo: 0, contagem: 0 }));

                        let rowsProcessed = [];
                        
                        // Variáveis de Redundância para o Lote Diário
                        let dataMaisRecente = "";
                        let pesoPendenteRedundancia = 0;
                        let pesoConcluidoHojeRedundancia = 0;

                        // Passo A: Identificar a data mais recente com movimentação na planilha
                        results.data.forEach(r => {
                            let keys = Object.keys(r);
                            let colData = keys.find(k => k.toLowerCase().includes('data'));
                            let dataStr = r[colData] ? normalizarData(r[colData]) : '';
                            if (dataStr && dataStr > dataMaisRecente) {
                                dataMaisRecente = dataStr;
                            }
                        });

                        // Passo B: Processar todos os dados
                        results.data.forEach(r => {
                            let keys = Object.keys(r);
                            let colResp = keys.find(k => k.toLowerCase().includes('respons') || k.toLowerCase().includes('nome') || k.toLowerCase().includes('separador'));
                            let colPeso = keys.find(k => k.toLowerCase().includes('peso'));
                            let colIni = keys.find(k => k.toLowerCase().includes('início') || k.toLowerCase().includes('inicio'));
                            let colFim = keys.find(k => k.toLowerCase().includes('termino') || k.toLowerCase().includes('término'));
                            let colData = keys.find(k => k.toLowerCase().includes('data'));

                            let resp = r[colResp] ? String(r[colResp]).trim() : '';
                            let peso = parseNumero(r[colPeso]);
                            let dataStr = r[colData] ? normalizarData(r[colData]) : '';
                            let temFim = r[colFim] && String(r[colFim]).trim() !== '';

                            if (peso <= 0) return;
                            totalPesoGeral += peso;

                            let horaFimNum = extrairHoraNumerica(r[colFim]);

                            rowsProcessed.push({ resp: resp, peso: peso, temFim: temFim, horaFimNum: horaFimNum, data: dataStr });

                            // LÓGICA DE REDUNDÂNCIA DO LOTE (Cálculo Fiel sem API)
                            // Soma todos os itens pendentes da planilha inteira
                            if (!resp || !temFim) {
                                pesoPendenteRedundancia += peso;
                            } 
                            // Soma todos os itens finalizados EXATAMENTE HOJE (na data mais recente)
                            else if (dataStr === dataMaisRecente) {
                                pesoConcluidoHojeRedundancia += peso;
                            }

                            // Cálculos Gerais (Tempo, Desempenho)
                            if (resp && temFim) {
                                let inicio = new Date('1970-01-01T' + (r[colIni] || '00:00:00'));
                                let fim = new Date('1970-01-01T' + (r[colFim] || '00:00:00'));
                                let duracao = (fim - inicio) / 60000;

                                if (duracao > 0) {
                                    pesoPorResp[resp] = (pesoPorResp[resp] || 0) + peso;
                                    tempoPorResp[resp] = (tempoPorResp[resp] || 0) + duracao;
                                    contagemPorResp[resp] = (contagemPorResp[resp] || 0) + 1;
                                    contagem++;
                                    tempoTotalGeral += duracao;

                                    if (dataStr) {
                                        let d = new Date(dataStr + 'T12:00:00');
                                        if (!isNaN(d.getTime())) {
                                            let m = d.getMonth();
                                            mesesHistoricos[m].totalTempo += duracao;
                                            mesesHistoricos[m].contagem++;
                                        }
                                    }
                                }
                            }
                        });

                        // Atualiza Indicadores Superiores
                        document.getElementById('txt-peso').innerText = totalPesoGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " Kg";
                        document.getElementById('txt-cargas').innerText = contagem;
                        let mediaGeral = contagem > 0 ? (tempoTotalGeral / contagem) : 0;
                        document.getElementById('txt-tempo').innerText = mediaGeral.toFixed(1) + " min";

                        // ==== DEFINIÇÃO FINAL DO LOTE (API vs Redundância) ====
                        // O peso total do lote é = O que ainda falta + O que já foi feito hoje
                        let pesoTotalFallback = pesoPendenteRedundancia + pesoConcluidoHojeRedundancia;
                        
                        let pesoTotalLote = (dadosApiAppsScript && dadosApiAppsScript.pesoTotal) ? dadosApiAppsScript.pesoTotal : pesoTotalFallback;
                        let pesoPendenteLote = (dadosApiAppsScript && dadosApiAppsScript.pesoPendente) ? dadosApiAppsScript.pesoPendente : pesoPendenteRedundancia;

                        // Calcula a porcentagem pendente
                        let pctPendente = pesoTotalLote > 0 ? Math.round((pesoPendenteLote / pesoTotalLote) * 100) : 0;
                        pctPendente = Math.max(0, Math.min(100, pctPendente));

                        // Atualiza a Interface do Card Burndown
                        document.getElementById('pct-texto').innerText = pctPendente + "%";
                        document.getElementById('pct-barra').style.width = pctPendente + "%";
                        
                        // Formatação de cores do progresso
                        let barra = document.getElementById('pct-barra');
                        let txtPct = document.getElementById('pct-texto');
                        if (pctPendente === 0) {
                            barra.style.background = "#10b981"; // Verde
                            txtPct.style.color = "#10b981";
                        } else if (pctPendente <= 30) {
                            barra.style.background = "linear-gradient(90deg, #f59e0b, #10b981)";
                            txtPct.style.color = "#f59e0b"; // Amarelo
                        } else {
                            barra.style.background = "linear-gradient(90deg, #ef4444, #f59e0b)";
                            txtPct.style.color = "#ef4444"; // Vermelho
                        }

                        document.getElementById('details').innerText = "Falta separar: " + Math.round(pesoPendenteLote).toLocaleString('pt-BR') + " kg de " + Math.round(pesoTotalLote).toLocaleString('pt-BR') + " kg definidos no lote.";

                        // RENDERIZA OS GRÁFICOS
                        desenharBurndown(pesoTotalLote, rowsProcessed, dataMaisRecente);
                        atualizarTabela(tempoPorResp, contagemPorResp);
                        desenharGrafico(pesoPorResp);
                        gerarGraficoTendencia(mesesHistoricos);
                    }
                });
            } catch (err) {
                console.error("Erro na atualização via CSV:", err);
            }
        }

        // DESENHO DO GRÁFICO DE BURNDOWN (INTUITIVO E ROBUSTO)
        function desenharBurndown(pesoTotal, rowsProcessed, dataMaisRecente) {
            const horasLabels = ['07:00', '09:00', '11:00', '13:00', '15:00', '17:00', '18:00'];
            const benchmarks = [7, 9, 11, 13, 15, 17, 18];
            const numPontos = horasLabels.length;

            // 1. Linha da Meta Ideal (Decrescente e tracejada)
            let dadosIdeais = [];
            for (let i = 0; i < numPontos; i++) {
                let val = pesoTotal - (pesoTotal * (i / (numPontos - 1)));
                dadosIdeais.push(Math.max(0, Math.round(val)));
            }

            // 2. Linha Real (O que já foi feito HOJE)
            let pesoConcluidoAteHora = Array(numPontos).fill(0);
            let dataAtualJS = new Date();
            let horaAtual = dataAtualJS.getHours();

            rowsProcessed.forEach(r => {
                // Filtra apenas o que foi finalizado na data da operação do lote
                if (r.resp && r.temFim && r.data === dataMaisRecente) {
                    let hNum = r.horaFimNum !== null ? r.horaFimNum : horaAtual;

                    benchmarks.forEach((bHora, idx) => {
                        if (hNum <= bHora) {
                            pesoConcluidoAteHora[idx] += r.peso;
                        }
                    });
                }
            });

            let dadosReais = [];
            for (let i = 0; i < numPontos; i++) {
                // Previne que a linha avance pelo gráfico para horas que ainda não aconteceram
                if (benchmarks[i] > horaAtual + 1 && i > 0 && dadosReais[i-1] !== null) {
                    dadosReais.push(null); 
                } else {
                    let restante = pesoTotal - pesoConcluidoAteHora[i];
                    dadosReais.push(Math.max(0, Math.round(restante)));
                }
            }

            const ctx = document.getElementById('graficoBurndown').getContext('2d');
            if (window.meuGraficoBurndown) window.meuGraficoBurndown.destroy();

            window.meuGraficoBurndown = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: horasLabels,
                    datasets: [
                        {
                            label: 'Carga Pendente (Real)',
                            data: dadosReais,
                            borderColor: '#38bdf8', // Azul claro
                            backgroundColor: 'rgba(56, 189, 248, 0.15)',
                            borderWidth: 3,
                            pointRadius: 5,
                            pointHoverRadius: 7,
                            pointBackgroundColor: '#fff',
                            spanGaps: true,
                            fill: true,
                            tension: 0.1,
                            order: 1
                        },
                        {
                            label: 'Meta Ideal',
                            data: dadosIdeais,
                            borderColor: 'rgba(239, 68, 68, 0.6)', // Vermelho translúcido
                            borderDash: [5, 5],
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            order: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top', labels: { color: '#94a3b8', boxWidth: 12 } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.y.toLocaleString('pt-BR') + ' Kg';
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: '#334155', display: false }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' }, min: 0 }
                    }
                }
            });
        }

        function gerarGraficoTendencia(mesesHistoricos) {
            const META_LIMITE = 30;
            const labelsMeses = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            
            let mediasReais = Array(12).fill(null);
            let xPoints = [], yPoints = [];

            for (let i = 0; i < 12; i++) {
                if (mesesHistoricos[i].contagem > 0) {
                    let mediaMes = mesesHistoricos[i].totalTempo / mesesHistoricos[i].contagem;
                    mediasReais[i] = parseFloat(mediaMes.toFixed(1));
                    xPoints.push(i);
                    yPoints.push(mediaMes);
                }
            }

            let slope = 0, intercept = META_LIMITE; 
            const n = xPoints.length;
            if (n > 1) {
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                for (let i = 0; i < n; i++) {
                    sumX += xPoints[i];
                    sumY += yPoints[i];
                    sumXY += xPoints[i] * yPoints[i];
                    sumX2 += xPoints[i] * xPoints[i];
                }
                slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                intercept = (sumY - slope * sumX) / n;
            } else if (n === 1) {
                intercept = yPoints[0];
            }

            let valoresTendencia = [];
            for (let i = 0; i < 12; i++) {
                valoresTendencia.push(parseFloat((slope * i + intercept).toFixed(1)));
            }

            let valoresMeta = Array(12).fill(META_LIMITE);

            const ctx = document.getElementById('graficoTendencia').getContext('2d');
            if (window.meuGraficoTendencia) window.meuGraficoTendencia.destroy();

            window.meuGraficoTendencia = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labelsMeses,
                    datasets: [
                        { label: 'Meta', data: valoresMeta, borderColor: '#ef4444', borderWidth: 1.5, pointRadius: 0, fill: false },
                        { label: 'Média Real', data: mediasReais, borderColor: '#38bdf8', backgroundColor: '#38bdf8', borderWidth: 3, pointRadius: 5, pointHoverRadius: 7, fill: false, tension: 0.1 },
                        { label: 'Tendência', data: valoresTendencia, borderColor: '#f59e0b', borderWidth: 2, borderDash: [5, 5], pointRadius: 0, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true, labels: { color: '#94a3b8' } } },
                    scales: {
                        x: { grid: { color: '#334155', display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 10 } }, min: 0 }
                    }
                }
            });
        }

        function atualizarTabela(tempoTotal, contagem) {
            let tbody = document.querySelector("#tabelaTempo tbody");
            tbody.innerHTML = "";
            for (let nome in tempoTotal) {
                let media = (tempoTotal[nome] / contagem[nome]).toFixed(1);
                tbody.innerHTML += `<tr><td>${nome}</td><td>${media} min</td></tr>`;
            }
        }

        function desenharGrafico(dados) {
            const ctx = document.getElementById('graficoSeparadores').getContext('2d');
            if(window.meuGrafico) window.meuGrafico.destroy();
            window.meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(dados), datasets: [{ label: 'Kg por Separador', data: Object.values(dados), backgroundColor: '#38bdf8' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } } }
            });
        }

        window.onload = function() {
            atualizarDados();
            setInterval(atualizarDados, 15000); // Atualiza em tempo real a cada 15 segundos
        };
    </script>
</body>
</html>
