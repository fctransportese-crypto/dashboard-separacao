<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Separação Lean</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #001f3f; color: white; padding: 20px; }
        .card { background: #0074D9; padding: 20px; border-radius: 10px; margin: 10px; display: inline-block; width: 300px; }
        h1 { text-align: center; }
    </style>
</head>
<body>
    <h1>Painel de Eficiência Operacional</h1>
    <div id="painel">
        <div class="card"><h3>Peso Total</h3><p id="total-peso">Carregando...</p></div>
        <div class="card"><h3>Eficiência (Kg/Min)</h3><p id="eficiencia">Calculando...</p></div>
    </div>

    <script>
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSL3CqlLCDtDL86CTEbVn0xWs1CmiG8cRY2sje9c9sqy8z4SMj3Fhqh_od5rte0yNP6fxPYB4VoFZwX/pub?gid=0&single=true&output=csv'; // <--- COLE O LINK AQUI

        function carregarDados() {
            Papa.parse(url, {
                download: true, header: true, dynamicTyping: true,
                complete: function(results) {
                    let peso = 0;
                    results.data.forEach(r => { if(r.Peso) peso += r.Peso; });
                    document.getElementById('total-peso').innerText = peso + " Kg";
                }
            });
        }
        setInterval(carregarDados, 300000); // Atualiza a cada 5 min
        carregarDados();
    </script>
</body>
</html>
